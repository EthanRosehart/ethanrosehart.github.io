name: Refresh data

# Pulls fresh public data and commits the snapshots to portfolio/glidepath/data/.
# GitHub Pages redeploys automatically, so the Glidepath app always serves last
# night's numbers — fetched server-side here, never from the visitor's browser.
#   airports.json         — OpenFlights authoritative airport reference
#   activity-index.json   — airport catalogue metadata (no series)
#   series/<IATA>.json    — one airport's monthly pax/movements/cargo, fetched
#                            by the browser lazily once that gateway is selected
#   macro.json            — World Bank population & historical GDP/capita
#   imf-weo.json           — IMF World Economic Outlook forward GDP/capita
#                            growth forecast (real, not extrapolated)
#   forecast-meta.json    — shared Meta Prophet model metadata
#   forecasts/<IATA>.json — one airport's short-term forecast, fetched lazily
#   forecasts-archive/    — monthly copies, for forecast-vs-realized tracking
#   manifest.json         — provenance manifest (scripts/build-manifest.mjs)
#
# Every fetch step is best-effort (a feed outage keeps the last good
# snapshot). The health step at the end sorts findings into two tiers so a
# single transient upstream blip doesn't page anyone for data that's still
# correct:
#   • notes  — a best-effort feed missed tonight but kept last-good AND is
#              watched for staleness (check-snapshots.mjs). Logged, not paged.
#   • alerts — a total activity outage, a snapshot that failed validation
#              (commit blocked), or a feed that has now gone STALE (aged past
#              the freshness window, per-source BTS included). These fail the
#              run and open/update the pipeline-health issue.
# Snapshots are schema-validated (scripts/validate-data.mjs) as a hard gate
# before anything is committed.

on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC nightly
  workflow_dispatch: {}     # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write           # commit the refreshed snapshot
  issues: write             # open/update the pipeline-health issue

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # kept for the end-of-run anomaly diff: dropped airports, shrunken
      # series, wholesale level shifts vs what was committed yesterday
      - name: Snapshot baseline for anomaly diff
        run: cp -r portfolio/glidepath/data /tmp/gp-baseline

      - name: Fetch airport reference (OpenFlights)
        id: openflights
        run: node portfolio/glidepath/scripts/fetch-openflights.mjs
        continue-on-error: true

      # BTS runs BEFORE fetch-activity: it needs the still-untrimmed
      # OpenFlights reference for US airport names/coords, and
      # fetch-activity then carries its index entries forward and trims
      # the reference to the union of both catalogues.
      - name: Fetch monthly activity — US (BTS T-100)
        id: bts
        run: node portfolio/glidepath/scripts/fetch-bts.mjs
        continue-on-error: true

      - name: Fetch monthly activity — Europe + Canada (Eurostat + StatCan)
        id: activity
        run: node portfolio/glidepath/scripts/fetch-activity.mjs
        continue-on-error: true   # a feed outage keeps the last good snapshot

      - name: Fetch macro snapshot from World Bank
        id: macro
        run: node portfolio/glidepath/scripts/fetch-data.mjs
        continue-on-error: true   # macro covers whatever countries activity found

      - name: Fetch forward GDP/capita forecast from IMF WEO
        id: imf
        run: node portfolio/glidepath/scripts/fetch-imf.mjs
        continue-on-error: true   # build-forecast.py falls back to trailing-rate extrapolation without it

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install forecasting deps (Prophet + holidays)
        run: pip install -r portfolio/glidepath/scripts/requirements.txt

      - name: Build short-term forecasts (Meta Prophet)
        id: forecast
        run: python portfolio/glidepath/scripts/build-forecast.py
        continue-on-error: true   # never block the data refresh on the model step

      # hard gate: a malformed upstream response must keep last-good,
      # never ship garbage to the site. The health step reports it.
      - name: Validate snapshots
        id: validate
        run: node portfolio/glidepath/scripts/validate-data.mjs
        continue-on-error: true

      - name: Build provenance manifest
        if: steps.validate.outcome == 'success'
        run: node portfolio/glidepath/scripts/build-manifest.mjs

      # one copy per calendar month, so "what did we predict vs what
      # happened" can be answered later without archaeology in git history
      - name: Archive forecasts (first run of the month)
        if: steps.validate.outcome == 'success'
        run: |
          ym=$(date -u +%Y-%m)
          dest="portfolio/glidepath/data/forecasts-archive/$ym"
          if [ ! -d "$dest" ] && [ -d portfolio/glidepath/data/forecasts ]; then
            mkdir -p "$dest"
            cp portfolio/glidepath/data/forecasts/*.json "$dest"/ 2>/dev/null || true
            cp portfolio/glidepath/data/forecast-meta.json "$dest/_meta.json" 2>/dev/null || true
            echo "Archived $(ls "$dest" | wc -l) forecast files to $dest"
          else
            echo "Archive for $ym already exists (or no forecasts) — skipping."
          fi

      # Auto-commit is main-only: dispatch runs on a feature branch still
      # exercise every fetcher (that's how you debug one — read the logs),
      # but committing snapshots to PR branches is what made PR #20
      # unmergeable — dozens of generated files conflicting with main's
      # own nightly commits.
      - name: Commit if changed (main only)
        if: steps.validate.outcome == 'success'
        run: |
          git add portfolio/glidepath/data/
          if git diff --staged --quiet; then
            echo "No change in data — nothing to commit."
          elif [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Refreshed data differs, but '$GITHUB_REF_NAME' is not main — skipping commit:"
            git diff --staged --stat | tail -5
          else
            git config user.name  "glidepath-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(data): nightly Glidepath refresh [skip ci]"
            git push
          fi

      # Sort findings into notes (last-good kept + watched for staleness —
      # logged, never paged) and alerts (site-affecting or no staleness safety
      # net — page + upsert the pipeline-health issue, main only, fail the run).
      - name: Pipeline health report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes=""; alerts=""
          note()  { notes="${notes}- $1"$'\n'; }
          alert() { alerts="${alerts}- $1"$'\n'; }

          # Best-effort feeds that keep last-good AND whose freshness
          # check-snapshots watches (openflights→airports.json, macro→macro.json,
          # imf→imf-weo.json, forecast→forecast-meta.json all via generatedAt;
          # bts via its per-source refreshedAt stamp). A single miss is expected
          # upstream weather, not an incident — it only becomes an alert once the
          # feed ages past the freshness window (the "stale snapshots" check).
          [ "${{ steps.openflights.outcome }}" = "failure" ] && note "fetch-openflights missed — airports.json keeps last-good (watched for staleness)"
          [ "${{ steps.bts.outcome }}" = "failure" ]         && note "fetch-bts missed — US airports keep last-good (watched for staleness)"
          [ "${{ steps.macro.outcome }}" = "failure" ]       && note "fetch-data (World Bank) missed — macro.json keeps last-good (watched for staleness)"
          [ "${{ steps.imf.outcome }}" = "failure" ]         && note "fetch-imf (IMF WEO) missed — last-good kept (forecast falls back to trailing-rate)"
          [ "${{ steps.forecast.outcome }}" = "failure" ]    && note "build-forecast (Prophet) missed — forecasts keep last-good (watched for staleness)"

          # activity's own exit-1 means a TOTAL Eurostat/StatCan outage or a
          # crash — the index's generatedAt is rewritten regardless, so this has
          # no staleness safety net and must page immediately. Validation failure
          # means a malformed snapshot blocked the commit — worth knowing now.
          [ "${{ steps.activity.outcome }}" = "failure" ]    && alert "fetch-activity (Eurostat/StatCan) failed — primary catalogue source down or crashed"
          [ "${{ steps.validate.outcome }}" = "failure" ]    && alert "snapshot VALIDATION failed — commit was blocked, site keeps last-good data"

          # staleness (a feed broken long enough to age past the window, incl.
          # per-source BTS) + anomaly diff. exit != 0 == a stale snapshot.
          set +e
          report=$(node portfolio/glidepath/scripts/check-snapshots.mjs --baseline /tmp/gp-baseline 2>&1)
          rc=$?
          set -e
          echo "$report"
          [ $rc -ne 0 ] && alert "stale snapshots — a feed has been failing long enough to age past the freshness window"

          [ -n "$notes" ] && { echo "NOTES (last-good kept, not paging):"; printf '%s' "$notes"; }

          if [ -z "$alerts" ]; then
            echo "Pipeline healthy — no alerts. Any missed feeds above kept last-good and are still fresh."
            exit 0
          fi

          echo "ALERTS:"
          printf '%s' "$alerts"

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            title="Glidepath nightly pipeline needs attention"
            notesBlock=""
            [ -n "$notes" ] && notesBlock=$(printf '**Also missed tonight (last-good kept, not paging)**\n%s\n' "$notes")
            body=$(printf 'Run: %s/%s/actions/runs/%s\n\n**Alerts**\n%s\n%s\n<details><summary>check-snapshots output</summary>\n\n```\n%s\n```\n</details>\n\n_Best-effort feeds keep last-good data, so the site stays correct — a feed that stays broken until it ages past the freshness window escalates here. Auto-filed by refresh-data.yml; closes by hand once resolved._' \
              "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" "$alerts" "$notesBlock" "$report")
            num=$(gh issue list --state open --search "Glidepath nightly pipeline in:title" --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -n "$num" ] && [ "$num" != "null" ]; then
              gh issue comment "$num" --body "$body"
              echo "Updated pipeline-health issue #$num"
            else
              gh issue create --title "$title" --body "$body"
              echo "Opened a new pipeline-health issue"
            fi
          fi
          exit 1
