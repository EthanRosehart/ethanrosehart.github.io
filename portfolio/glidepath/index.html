</head>
<body>
  <div id="root">
    <div id="boot-msg" style="height:100vh;display:grid;place-items:center;color:#636978;font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.1em">LOADING GLIDEPATH…</div>
  </div>
  <noscript>
    <div style="position:fixed;inset:0;display:grid;place-items:center;background:#0b0c10;color:#9aa1b1;font-family:monospace;font-size:14px;text-align:center;padding:24px">
      Glidepath needs JavaScript to run — please enable it and reload.
    </div>
  </noscript>
  <script>
    // If the app hasn't mounted, say what happened instead of a silent
    // failure. Two shapes of failure, one message:
    //  - a script never loaded (blocked/404): the LOADING placeholder is
    //    still sitting in #root after 12s;
    //  - the app crashed during its first render: React clears #root when
    //    the root is created, so a crash leaves the page truly EMPTY — the
    //    error listener catches that instantly (and the timer backstops it).
    (function () {
      var shown = false;
      function bootFailed() {
        if (shown || document.querySelector(".app")) return;
        shown = true;
        var root = document.getElementById("root");
        root.innerHTML =
          '<div style="height:100vh;display:grid;place-items:center;color:#636978;' +
          "font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.1em;" +
          'text-align:center;line-height:2">' +
          "Glidepath couldn&rsquo;t start &mdash; a script failed to load or crashed.<br>" +
          "Check the browser console for details, then hard-refresh (Ctrl/Cmd+Shift+R).</div>";
      }
      window.addEventListener("error", function () {
        // only a PRE-mount error means the app never came up; give the
        // page a beat in case React is mid-mount when the event fires
        setTimeout(bootFailed, 250);
      });
      setTimeout(bootFailed, 12000);
    })();
  </script>

  <!-- React 18.3.1 UMD, self-hosted (vendor/README.md documents how to
       update). Served same-origin by GitHub Pages so the app has no
       runtime dependency on a third-party CDN: an unpkg outage used to
       leave this page stuck on the loading screen with no error. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>

  <!-- Precompiled by build.mjs (esbuild) from data.jsx / charts.jsx /
       screens-setup.jsx / screens-forecast.jsx / screens-strategic.jsx /
       app.jsx, in that order — see README.md § Architecture. Run
       `npm run build` after editing any .jsx file. -->
  <script src="dist/app.bundle.js"></script>
</body>
</html>
